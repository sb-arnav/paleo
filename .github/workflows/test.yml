name: tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Smoke-test CLI (subcommand help)
        run: |
          python paleo.py --help
          python paleo.py dead --help
          python paleo.py policy --help
          python paleo.py claims --help
          python paleo.py crons --help
